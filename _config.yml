# =========================
# JEKYLL CHIRPY CONFIG (DSGSEC)
# Optimized Cybersecurity Blog
# =========================

theme: jekyll-theme-chirpy

# -------------------------
# SITE BASICS
# -------------------------

title: DSGSEC
tagline: Cybersecurity Writeups • Pentest • IoT • Vulnerability Research

description: >-
  Cybersecurity blog covering penetration testing (HackTheBox, CTF),
  vulnerability research (CVE, exploits), IoT security, and defensive
  security (DFIR, blue team analysis).

lang: en
timezone: Europe/Paris

url: "https://dsgsec.github.io"
baseurl: ""

# -------------------------
# GITHUB
# -------------------------

github:
  username: dsgsec

# -------------------------
# SOCIAL / AUTHOR
# -------------------------

social:
  name: Damien SUIVENG-GASPARI
  email: damien.dsgsec@gmail.com
  links:
    - https://github.com/dsgsec
    - https://www.linkedin.com/in/damien-s-697b3821b/

# -------------------------
# SEO IMAGE
# -------------------------

social_preview_image: /assets/img/og-image.png

# -------------------------
# THEME SETTINGS
# -------------------------

theme_mode: dark

toc: true

paginate: 8

# -------------------------
# PWA
# -------------------------

pwa:
  enabled: true
  cache:
    enabled: true

# -------------------------
# ANALYTICS (optional)
# -------------------------

analytics:
  google:
    id:
  goatcounter:
    id:

pageviews:
  provider:

# -------------------------
# COMMENTS (GISCUS RECOMMENDED)
# -------------------------

comments:
  provider: giscus
  giscus:
    repo: dsgsec/dsgsec.github.io
    repo_id:
    category: Comments
    category_id:
    mapping: pathname
    strict: "0"
    input_position: bottom
    lang: en
    reactions_enabled: "1"

# -------------------------
# ASSETS
# -------------------------

cdn:

avatar: https://media.licdn.com/dms/image/v2/D4E03AQEzMdK-k_5lAQ/profile-displayphoto-crop_800_800/B4EZ3Ukz7kKcAI-/0/1777387920883?e=1779321600&v=beta&t=0cZYU5fV50FMW7kc-9PXGbDs50Qb_H_QzZhjl6mF3e0

# -------------------------
# SEO / ARCHIVES
# -------------------------

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tag/:name/
    category: /category/:name/

# -------------------------
# COLLECTIONS
# -------------------------

collections:
  tabs:
    output: true
    sort_by: order
  projects:
    output: true

# -------------------------
# DEFAULTS
# -------------------------

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/

  - scope:
      path: _drafts
    values:
      comments: false

  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

# -------------------------
# MARKDOWN ENGINE
# -------------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

sass:
  style: compressed

# -------------------------
# HTML COMPRESSION
# -------------------------

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

# -------------------------
# EXCLUDE
# -------------------------

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

# -------------------------
# JEKYLL ARCHIVES
# -------------------------

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tag/:name/
    category: /category/:name/
